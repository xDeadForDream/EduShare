{% extends "base.html" %}
{% block title %}Регистрация{% endblock %}
{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 60vh;">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow-lg border-0">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-primary">Присоединяйтесь</h2>
                    <p class="text-muted">Создайте аккаунт для доступа к материалам</p>
                </div>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label small text-uppercase fw-bold text-muted">Придумайте логин</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small text-uppercase fw-bold text-muted">Email</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label small text-uppercase fw-bold text-muted">Пароль</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100 py-2 fw-bold shadow-sm">Зарегистрироваться</button>
                </form>
                <div class="text-center mt-4">
                    <small class="text-muted">Уже есть аккаунт? <a href="{{ url_for('auth.login') }}" class="text-decoration-none fw-bold">Войти</a></small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
